<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pindah Alamat - SMP Al-Wathoniyah 9</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Design Tokens System */
        :root {
            /* Backgrounds */
            --bg-base: #F8FAFC; /* Slate 50 - off white */
            --bg-surface: rgba(255, 255, 255, 0.7); /* Glassmorphism base */
            
            /* Text Colors */
            --text-heading: #0F172A; /* Slate 900 */
            --text-body: #475569; /* Slate 600 */
            --text-muted: #94A3B8; /* Slate 400 */
            
            /* Brand/Accent Colors (Emerald for Islamic/School feel) */
            --accent-main: #059669; /* Emerald 600 */
            --accent-hover: #047857; /* Emerald 700 */
            --accent-light: #D1FAE5; /* Emerald 100 */
            --accent-ring: rgba(5, 150, 105, 0.2);
            
            /* Shapes & Shadows */
            --radius-lg: 24px;
            --radius-md: 14px;
            --shadow-card: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-heading);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Animations */
        .ambient-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .ambient-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            background: var(--accent-light);
            width: 50vw;
            height: 50vw;
            max-width: 500px;
            max-height: 500px;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            background: #E0E7FF; /* Soft Indigo */
            width: 40vw;
            height: 40vw;
            max-width: 400px;
            max-height: 400px;
            bottom: -10%;
            right: -5%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 3%) scale(1.1); }
            100% { transform: translate(-3%, 5%) scale(0.95); }
        }

        /* Layout & Card */
        .main-card {
            position: relative;
            z-index: 1;
            background: var(--bg-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 3.5rem 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card), inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            width: 90%;
            max-width: 480px;
            text-align: center;
            
            /* Entrance Animation */
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Signature Element: Icon Wrapper */
        .icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-light) 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: var(--accent-main);
            box-shadow: 0 10px 20px var(--accent-ring), inset 0 0 0 1px rgba(255,255,255,0.8);
            position: relative;
        }

        .icon-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            box-shadow: 0 0 0 0 var(--accent-main);
            animation: pulse 2s infinite cubic-bezier(0.66, 0, 0, 1);
            opacity: 0.4;
        }

        @keyframes pulse {
            to {
                box-shadow: 0 0 0 20px rgba(5, 150, 105, 0);
            }
        }

        .icon-container svg {
            width: 36px;
            height: 36px;
            stroke-width: 1.8;
        }

        /* Typography Styles */
        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            line-height: 1.2;
            color: var(--text-heading);
        }

        .description {
            font-size: 1.05rem;
            color: var(--text-body);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .domain-tag {
            display: inline-block;
            background: #F1F5F9;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-heading);
            margin-top: 0.75rem;
            border: 1px solid #E2E8F0;
        }

        /* Interaction: Button */
        .primary-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background-color: var(--accent-main);
            color: white;
            text-decoration: none;
            padding: 1.1rem 2rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 16px var(--accent-ring);
        }

        .primary-cta:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px var(--accent-ring);
        }

        .primary-cta:active {
            transform: translateY(0);
        }

        .primary-cta svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .primary-cta:hover svg {
            transform: translateX(5px);
        }
        
        .footer-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .main-card {
                padding: 2.5rem 1.5rem;
                width: 92%;
            }
            h1 { font-size: 1.5rem; }
            .description { font-size: 1rem; }
        }
    </style>
</head>
<body>
    
    <!-- Background visual layer -->
    <div class="ambient-layer">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
    </div>

    <!-- Main Content -->
    <main class="main-card">
        
        <!-- Signature Animated Icon -->
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418" />
            </svg>
        </div>
        
        <h1>Aplikasi Telah Berpindah Alamat</h1>
        
        <p class="description">
            Sistem informasi SMP Al-Wathoniyah 9 kini beroperasi di server dan alamat baru untuk layanan yang lebih optimal.<br>
            <span class="domain-tag">smpalwathoniyah9.yalwash9.org</span>
        </p>

        <!-- CTA Action -->
        <a href="https://smpalwathoniyah9.yalwash9.org" class="primary-cta">
            Menuju Halaman Baru
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
        </a>
        
        <div class="footer-text">
            * Silakan bookmark alamat baru ini untuk kunjungan berikutnya.
        </div>
        
    </main>

</body>
</html>
